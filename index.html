<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee Post Manager PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ee4d2d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1162/1162499.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --primary: #ee4d2d;
            --secondary: #28a745;
            --bg: #f4f4f4;
            --border: #ddd;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; }
        header { text-align: center; margin-bottom: 25px; }
        h1 { color: var(--primary); margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #666; margin-top: 5px; }
        
        .upload-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; text-align: center; border: 2px dashed var(--border); }
        .btn-upload { background: var(--primary); color: white; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block; transition: 0.3s; box-shadow: 0 4px 0 #b3361b; }
        .btn-upload:active { transform: translateY(3px); box-shadow: none; }
        input[type="file"] { display: none; }

        .table-container { background: white; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #fdfdfd; padding: 15px; text-align: left; border-bottom: 3px solid var(--border); font-size: 0.85em; color: #555; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: top; transition: background 0.4s ease; }
        
        /* Largura das Colunas */
        .col-check { width: 90px; text-align: center; }
        .col-date { width: 130px; text-align: center; font-size: 0.8em; color: #888; border-right: 1px solid #eee; }
        .col-desc { width: 40%; }
        .col-tags { width: 25%; }
        .col-actions { width: 180px; }

        textarea { width: 100%; height: 110px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 0.9em; resize: none; box-sizing: border-box; background: #fff; transition: border-color 0.3s; }
        textarea:focus { border-color: var(--primary); outline: none; }
        
        .btn-copy { background: #6c757d; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.75em; margin-top: 6px; width: 100%; font-weight: bold; transition: 0.2s; }
        .btn-copy:hover { background: #495057; }
        .btn-copy.success { background: var(--secondary) !important; }

        .btn-photos { background: #0062cc; color: white; text-decoration: none; padding: 12px; border-radius: 6px; font-size: 0.85em; display: block; text-align: center; font-weight: bold; margin-bottom: 8px; box-shadow: 0 3px 0 #004085; }
        .btn-photos:active { transform: translateY(2px); box-shadow: none; }
        
        .checkbox-custom { width: 25px; height: 25px; cursor: pointer; accent-color: var(--secondary); margin-top: 10px; }
        
        /* Estilo para itens postados */
        .posted-row { background-color: #f8f9fa !important; }
        .posted-row td { opacity: 0.6; }
        .posted-row textarea { background-color: #eee; border-color: #ccc; cursor: not-allowed; }
        .posted-row .btn-photos { background: #868e96; box-shadow: 0 3px 0 #495057; }

        .empty-msg { padding: 60px; text-align: center; color: #aaa; font-style: italic; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📦 Shopee Post Manager Pro</h1>
        <p>Pendentes no topo • Postados no final • Pronto para PWA</p>
    </header>

    <div class="upload-card">
        <label for="csvInput" class="btn-upload">📂 SELECIONAR PLANILHA CSV</label>
        <input type="file" id="csvInput" accept=".csv">
    </div>

    <div class="table-container">
        <table id="postTable">
            <thead>
                <tr>
                    <th class="col-check">Postado?</th>
                    <th class="col-date">Data Postagem</th>
                    <th class="col-desc">Legenda (Editável)</th>
                    <th class="col-tags">Hashtags</th>
                    <th class="col-actions">Ações</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-msg">Nenhuma planilha carregada no momento.</div>
    </div>
</div>

<script>
    let products = [];

    // Carregar arquivo CSV
    document.getElementById('csvInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                products = results.data.map((item, index) => ({
                    ...item,
                    internalId: index,
                    posted: false,
                    postDate: '',
                    generatedDesc: createDescription(item),
                    generatedTags: createHashtags(item)
                }));
                renderTable();
            }
        });
    });

    // Gerador de Legenda
    function createDescription(item) {
        const name = item['Item Name'] || "";
        const price = item['Price'] || "";
        const link = item['Offer Link'] || item['Product Link'] || "";
        return `🔥 PROMOÇÃO 🔥\n\n✨ ${name}\n\n💰 Por apenas R$ ${price}\n\n🔗 Link de compra: ${link}\n\n⚠️ Corra antes que o estoque acabe!`;
    }

    // Gerador de Hashtags
    function createHashtags(item) {
        const name = (item['Item Name'] || "").toLowerCase();
        const words = name.replace(/[^a-zA-Záàâãéèêíïóôõöúç ]/g, "").split(' ');
        const relevant = words.filter(w => w.length > 3).slice(0, 6);
        let tags = relevant.map(w => "#" + w).join(" ");
        return tags + " #shopee #ofertas #promoção #compras";
    }

    // Função de Troca de Status (e Ordenação)
    function togglePosted(id) {
        const index = products.findIndex(p => p.internalId === id);
        if (index > -1) {
            products[index].posted = !products[index].posted;
            if (products[index].posted) {
                const now = new Date();
                products[index].postDate = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            } else {
                products[index].postDate = '';
            }
            renderTable();
        }
    }

    // Desenha a Tabela
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');
        tbody.innerHTML = '';
        
        if (products.length === 0) {
            emptyState.style.display = 'block';
            return;
        }
        emptyState.style.display = 'none';

        // ORDENAÇÃO: Não postados (false) em cima, Postados (true) embaixo
        const sortedProducts = [...products].sort((a, b) => a.posted - b.posted);

        sortedProducts.forEach((item) => {
            const tr = document.createElement('tr');
            if (item.posted) tr.className = 'posted-row';
            
            tr.innerHTML = `
                <td class="col-check">
                    <input type="checkbox" class="checkbox-custom" ${item.posted ? 'checked' : ''} onchange="togglePosted(${item.internalId})">
                </td>
                <td class="col-date">${item.postDate || '--'}</td>
                <td class="col-desc">
                    <textarea id="desc-${item.internalId}">${item.generatedDesc}</textarea>
                    <button class="btn-copy" onclick="copyValue('desc-${item.internalId}', this)">COPIAR LEGENDA</button>
                </td>
                <td class="col-tags">
                    <textarea id="tags-${item.internalId}">${item.generatedTags}</textarea>
                    <button class="btn-copy" onclick="copyValue('tags-${item.internalId}', this)">COPIAR HASHTAGS</button>
                </td>
                <td class="col-actions">
                    <a href="${item['Product Link']}" target="_blank" class="btn-photos">🖼️ PEGAR FOTOS</a>
                    <div style="text-align:center; font-size:10px; color:#aaa;">Ref: ${item['Item Id']}</div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Função Copiar
    function copyValue(id, btn) {
        const textarea = document.getElementById(id);
        textarea.select();
        document.execCommand("copy");
        
        const originalText = btn.innerText;
        btn.innerText = "✅ COPIADO!";
        btn.classList.add('success');
        setTimeout(() => {
            btn.innerText = originalText;
            btn.classList.remove('success');
        }, 1500);
    }

    // Registro do Service Worker para PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registrado!', reg))
                .catch(err => console.err('Falha ao registrar SW', err));
        });
    }
</script>

</body>
</html>
